name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Secret factice pour permettre le build en CI (aucune donnée réelle).
          JWT_SECRET: ci-build-only-secret-not-used-in-production-32c
